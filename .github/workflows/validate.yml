name: Validate Skill Polisher

on:
  push:
  pull_request:

jobs:
  validate:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.12"]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          repository: Conradgui/skill-creator-pro
          ref: eb23656e56ea3555599a6c5278a8b5834dc56b6d
          path: .tmp/skill-creator-pro

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Compile repository checks
        run: python -m compileall -q scripts tests

      - name: Validate repository contract
        run: python scripts/validate_repository.py

      - name: Run repository validator regressions
        run: python -m unittest discover -s tests -v

      - name: Validate skill structure
        run: python .tmp/skill-creator-pro/skills/skill-creator-pro/scripts/quick_validate.py skills/skill-polisher

      - name: Run strict quality lint
        run: python .tmp/skill-creator-pro/skills/skill-creator-pro/scripts/quality_lint.py skills/skill-polisher --strict
